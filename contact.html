<nav>
  <h2>mayjune</h2>
  <div class="nav-links">
    <a href="index.html">home</a>
    <a href="music.html">music</a>
    <a href="about.html">about</a>
    <a href="contact.html">contact</a>
  </div>
</nav>

<section class="hero-small">
  <h1>get in touch</h1>
  <p>bookings, collabs, or just to say hi</p>
</section>

<section class="contact-section">
  <div class="contact-container">

    <div class="contact-form">
      <div class="form-group">
        <input type="text" placeholder="your name" />
      </div>
      <div class="form-group">
        <input type="email" placeholder="your email" />
      </div>
      <div class="form-group">
        <textarea rows="6" placeholder="your message"></textarea>
      </div>
      <button class="button primary" type="submit">send it</button>
    </div>

    <div class="contact-info">
      <div class="info-item">
        <h3>bookings</h3>
        <p><a href="mailto:book@mayjune.com">book@mayjune.com</a></p>
      </div>
      <div class="info-item">
        <h3>general</h3>
        <p><a href="mailto:hello@mayjune.com">hello@mayjune.com</a></p>
      </div>
      <div class="info-item">
        <h3>based in</h3>
        <p>somewhere between the dancefloor and the studio</p>
      </div>
    </div>

  </div>
</section>

<footer>
  © 2026 mayjune
</footer>

</body>
</html>
